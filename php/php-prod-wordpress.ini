# /usr/local/etc/php/conf.d/zz-wordpress-custom.ini

; ==========================================
; WORDPRESS PRODUCTION OPTIMIZED SETTINGS
; ==========================================

; Memory & Performance
memory_limit = 1G
max_execution_time = 300
max_input_time = 300
max_input_vars = 3000

; Upload Settings
upload_max_filesize = 256M
post_max_size = 256M
max_file_uploads = 50M

; Session & Security
session.gc_maxlifetime = 3600
session.cookie_httponly = On
session.use_strict_mode = On
allow_url_fopen = Off
allow_url_include = Off
expose_php = Off

; Performance Optimizations
output_buffering = 8192
realpath_cache_size = 4M
realpath_cache_ttl = 600

; ==========================================
; OPCACHE OPTIMIZED FOR WORDPRESS
; ==========================================
; Sobrescreve as configurações do opcache-recommended.ini

; Basic OPcache Settings
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000

; Production Settings (desativa revalidação para máxima performance)
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0

; Advanced Optimizations
opcache.save_comments = 0
opcache.fast_shutdown = 1
opcache.enable_file_override = 1
opcache.optimization_level = 0xffffffff

; WordPress specific
opcache.max_wasted_percentage = 5
opcache.consistency_checks = 0
opcache.force_restart_timeout = 180