<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Termo de Autorização</title>

<style>
    html,body {
        font-family: "Open Sans", "Helvetica", Arial, sans-serif;
        margin:0;
        padding: 5px 25px;
        color:#222;
    }

    body{
        line-height: 14px;
    }

    .container{
        width:100%;
        max-width:800px;
        margin:0 auto;
        position:relative;
    }

    .top-logo {
        position: absolute;
        top: 0;
        right: 0;
        text-align: right;
        padding: 25px;
    }

    .top-logo img {
        max-width:70px;
        height:auto;
        display:block;
    }

    .termo {
        margin-top: 20px;
        padding: 35px; 
    }

    .termo h3 {
        font-size:12px;
        margin:0 0 12px 0;
        text-align:center;
    }

    .termo p {
        font-size:10px;
    }

    .field {
        margin: 10px 0;
    }

    .field strong {
        display:inline-block; width:200px;
    }

    footer {
        margin-top:10px;
        padding-top:12px;
    }

    footer #faixas {
        height: 30px;
        width: 750px;
        margin-bottom: 20px;
    }

    #logomarcas {
        width: 600px;
        margin: 0 auto;
        text-align:center;
    }

    #logomarcas img {
        max-height:60px;
        width:auto;
        display:block;
    }

    /* Impressão: forçar paginação antes do rodapé */
    .page-break { page-break-after: always; }
    
</style>
</head>
<body>
  <div class="container">
    <div class="top-logo">
      <img src="{{LOGO_TOPO}}">
    </div>

    <section class="termo">
        {{CONTEUDO}}
    </section>

    <footer>
        <img src="{{FAIXA_RODAPE}}" alt="" id="faixas">
      <div id="logomarcas">
        {{LOGOS_RODAPE}}
      </div>
    </footer>
  </div>
</body>
</html>
