<VirtualHost *:8080>
    # Configure ServerAdmin and ServerName
    LogLevel debug

    ServerName  localhost
    ServerAdmin webmaster@localhost
	
    # Configure main document root
    DocumentRoot /var/www/html

    <Location "/healthz">
        SetEnv nologging
        RewriteEngine on
        RewriteRule .* - [R=200,L]
        ErrorDocument 200 "OK"
        ProxyPass !
    </Location>

    <Location "/metrics/apache">
        SetEnv nologging
        Order deny,allow
        Deny from ${METRICS_DENY_FROM}
        Allow from ${METRICS_ALLOW_FROM}
        ProxyPass !
        SetHandler server-status
    </Location>

    # Set basic settings for document root
    <Directory "/var/www/html">
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks +MultiViews
        DirectoryIndex index.html index.htm index.php
    </Directory>

    # Set the Timeout

    Timeout 300
    ProxyTimeout 300

    # Healthchecks: Set /ping to be the healhcheck URL
    ProxyPass "/fpm-ping" "fcgi://${PHPFPM_SOCK_PATH}/"
    ProxyPassReverse "/fpm-ping" "fcgi://${PHPFPM_SOCK_PATH}"

    # Status: Set /status to be the healhcheck URL
    ProxyPass "/fpm-status" "fcgi://${PHPFPM_SOCK_PATH}"
    ProxyPassReverse "/fpm-status" "fcgi://${PHPFPM_SOCK_PATH}"

    # For any files that match PHP, pass it to PHP-FPM for processing
    <FilesMatch "\.php$">
        ProxyFCGIBackendType GENERIC
        SetHandler "proxy:fcgi://${PHPFPM_SOCK_PATH}"
    </FilesMatch>

    <IfModule remoteip_module>
        RemoteIPInternalProxy 10.42.0.0/16
        RemoteIPHeader X-Real-IP
    </IfModule>

    # Configure Log Settings
    <IfModule log_config_module>
        LogLevel  error
        ErrorLog  /var/log/apache2/error.log
        SetEnvIf  Request_URI "\.(css|js|jpe?g|png|gif|ico|cur|heic|webp|tiff?|mp3|m4a|aac|ogg|midi?|wav|mp4|mov|webm|mpe?g|avi|ogv|flv|wmv|svgz?|ttf|ttc|otf|eot|woff2?)(\.map)?$" nolog
        CustomLog /var/log/apache2/access.log combined env=!nolog
    </IfModule>
</VirtualHost>